<div class="w-100 mb4 nested-copy-line-height relative bg-white">
  <div class="mb3 pa4 gray overflow-hidden bg-white">

    {{ with .Params.image }}
      <div class="mb3">
        <img src="{{ . | relURL }}" alt="Featured image for {{ $.Title }}" style="width:100%; height:auto; border-radius: 6px;">
      </div>
    {{ end }}

    {{ with .CurrentSection.Title }}
      <span class="f6 db">{{ . }}</span>
    {{ end }}

    <h1 class="f3 near-black">
      <a href="{{ .RelPermalink }}" class="link black dim">
        {{ .Title }}
      </a>
    </h1>

    <div class="nested-links f5 lh-copy nested-copy-line-height">
      {{ .Summary }}
    </div>

    <a href="{{ .RelPermalink }}" class="ba b--moon-gray bg-light-gray br2 color-inherit dib f7 hover-bg-moon-gray link mt3 ph3 pv1">
      Read More →
    </a>

  </div>
</div>
